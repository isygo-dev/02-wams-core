server:
  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: -1
  port: 40404

eureka:
  instance:
    prefer-ip-address: true
    #hostname: discovery-service
  client:
    serviceUrl:
      defaultZone: http://localhost:8061/eureka/

camel:
  springboot:
    routes-include-pattern: classpath:camel/*.xml #file:camel/*.xml

logging:
  level:
    eu.isygoit: INFO
    org.apache.kafka: INFO
    org.apache.camel: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{traceId:-},%X{spanId:-}] ${LOG_LEVEL_PATTERN:-%5p} %m%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%X{traceId:-},%X{spanId:-}] ${LOG_LEVEL_PATTERN:-%5p} %m%n"
  file: mms.log

springdoc:
  packagesToScan: eu.isygoit
  api-docs:
    path=/api-docs:
  swagger-ui:
    path=/swagger-ui-custom:
      html:
    operationsSorter=method:

spring:
  #  autoconfigure:
  #    exclude:
  #      - org.springframework.boot.autoconfigure.data.cassandra.CassandraDataAutoConfiguration
  #      - org.springframework.boot.autoconfigure.data.cassandra.CassandraReactiveDataAutoConfiguration
  #      - org.springframework.boot.autoconfigure.cassandra.CassandraAutoConfiguration
  cassandra:
    contact-points: localhost #cassandra
    keyspace-name: isygoit
    port: 9042
    local-datacenter: datacenter1
    schema-action: CREATE_IF_NOT_EXISTS
    create-keyspace: true
    username: admin
    password: admin
  servlet:
    multipart:
      enabled: true
      max-file-size: 30MB
      max-request-size: 30MB
  hazelcast:
    config: classpath:cache/hazelcast.xml
  output:
    ansi:
      enabled: always
  kafka:
    topics:
      register-api-permission: to-ims-register-api-permission
      register-account: to-ims-register-account
      send-email: to-mms-send-email
    producer:
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer
      key-serializer: org.apache.kafka.common.serialization.ByteArraySerializer
      bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest
      bootstrap-servers: localhost:9092
      group-id: group-id
      value-deserializer: org.apache.kafka.common.serialization.ByteArraySerializer
      key-deserializer: org.apache.kafka.common.serialization.ByteArraySerializer

  datasource:
    continue-on-error: true
    initialization-mode: always
    mode: true
    url: jdbc:postgresql://localhost:5432/postgres?currentSchema=mms
    username: postgres
    password: root
  flyway:
    baseline-on-migrate: true
    baseline-version: 1.0.0
    check-locations: true
    default-schema: mms
    enabled: false
    group: true
    locations: classpath:migration/01-dev
    target: 1.0.231013.1
    schemas: mms
    table: schema_migration
  jpa:
    hibernate:
      ddl-auto: update #create #update #validate #create-drop
      naming:
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyHbmImpl
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
      show-sql: true
    properties:
      org:
        hibernate:
          envers:
            audit_table_prefix: AUD_
            revision_type_field_name: REV_TYPE
            audit_table_suffix: ''
            store_data_at_delete: 'true'
            revision_field_name: REV_ID
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        temp:
          use_jdbc_metadata_defaults: false
  mail:
    host: localhost
    port: 1025
    default-sender: 'noreply.maildev@isygoit.eu'
    username: 'noreply.maildev@isygoit.eu'
    password: 'E6lJhUwV0oD7q84oir9X'
    debug: true
    transport:
      protocol: 'smtp'
    properties:
      mail:
        smtp:
          auth: false
          connectiontimeout: 5000
          starttls:
            enable: false
          timeout: 5000
          writetimeout: 5000

mail:
  mime:
    charset: UTF-8

